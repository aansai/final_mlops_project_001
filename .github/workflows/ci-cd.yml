# ═══════════════════════════════════════════════════════════════
# .github/workflows/ci-cd.yml
# ═══════════════════════════════════════════════════════════════
#
# ✅ NEVER CHANGE:
#   - Overall job structure (ci → build → deploy)
#   - Secret variable syntax (${{ secrets.X }})
#   - Docker build/push steps structure
#   - Health check after deploy step
#
# 🔄 ALWAYS CHANGE:
#   - APP_NAME → your project name
#   - ECR_REPOSITORY → your AWS ECR repo name
#   - AWS_REGION → your AWS region
#   - Python version → match your project
#   - Branch names → your branch strategy
# ═══════════════════════════════════════════════════════════════

name: CI/CD Pipeline

# ───────────────────────────────────────────
# TRIGGERS
# ✅ NEVER CHANGE: structure
# 🔄 CHANGE: branch names
# ───────────────────────────────────────────
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main


# ───────────────────────────────────────────
# ENVIRONMENT VARIABLES
# ✅ NEVER CHANGE: syntax
# 🔄 CHANGE: values per project
# ───────────────────────────────────────────
env:
  # 🔄 CHANGE: your project name
  APP_NAME: mlops-clothes-project

  # ✅ reads from your GitHub secret ECR_REPOSITORY_NAME
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}

  # ✅ reads from your GitHub secret AWS_REGION
  AWS_REGION: ${{ secrets.AWS_REGION }}

  # 🔄 CHANGE: match your Dockerfile Python version
  PYTHON_VERSION: "3.11"

  # ✅ NEVER CHANGE: traceable image tag
  IMAGE_TAG: ${{ github.sha }}


# ═══════════════════════════════════════════════
# JOB 1 — CI
# Runs on every push and PR
# ═══════════════════════════════════════════════
jobs:
  ci:
    name: Test & Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ✅ NEVER CHANGE: cache structure
      # 🔄 CHANGE: pyproject.toml if you use requirements.txt
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ✅ NEVER CHANGE: structure
      # 🔄 CHANGE: pyproject.toml → requirements.txt if needed
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      # ✅ NEVER CHANGE: lint structure
      - name: Lint with flake8
        run: |
          flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app.py --count --max-line-length=120 --statistics --exit-zero

      # ✅ NEVER CHANGE: test structure
      - name: Run tests
        run: |
          pytest tests/test_data.py -v --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


  # ═══════════════════════════════════════════════
  # JOB 2 — Build & Push Docker Image
  # Runs only on push to main
  # ═══════════════════════════════════════════════
  build:
    name: Build & Push Docker Image
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ NEVER CHANGE: AWS credentials structure
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ✅ NEVER CHANGE: ECR login
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ✅ NEVER CHANGE: build and push structure
      - name: Build and push Docker image
        env:
          # ✅ uses your AWS_ECR_LOGIN_URI secret
          ECR_REGISTRY: ${{ secrets.AWS_ECR_LOGIN_URI }}
        run: |
          docker build \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --file Dockerfile \
            .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Save image URI
        run: echo "${{ env.IMAGE }}" > image-uri.txt

      - name: Upload image URI artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-uri
          path: image-uri.txt


  # ═══════════════════════════════════════════════
  # JOB 3 — Deploy to AWS EC2
  # Runs only after build passes
  # ═══════════════════════════════════════════════
  deploy:
    name: Deploy to AWS EC2
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ✅ NEVER CHANGE: SSH deploy structure
      # 🔄 CHANGE: volume paths, container name, port
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR from EC2
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS \
              --password-stdin ${{ secrets.AWS_ECR_LOGIN_URI }}

            # Pull latest image
            docker pull ${{ secrets.AWS_ECR_LOGIN_URI }}/${{ secrets.ECR_REPOSITORY_NAME }}:latest

            # Stop and remove old container
            # 🔄 CHANGE: mlops-clothes-api → your container name
            docker stop mlops-clothes-api 2>/dev/null || true
            docker rm   mlops-clothes-api 2>/dev/null || true

            # Run new container
            # 🔄 CHANGE: ports and volume paths if different
            docker run -d \
              --name mlops-clothes-api \
              --restart unless-stopped \
              -p 8000:8000 \
              -v /home/ubuntu/models:/app/models:ro \
              -v /home/ubuntu/data/processed:/app/data/processed:ro \
              -v /home/ubuntu/config:/app/config:ro \
              -v /home/ubuntu/logs:/app/logs \
              ${{ secrets.AWS_ECR_LOGIN_URI }}/${{ secrets.ECR_REPOSITORY_NAME }}:latest

            # ✅ NEVER CHANGE: health check verification
            echo "Waiting for app to start..."
            sleep 15
            curl --fail http://localhost:8000/health || exit 1
            echo "Deployment successful!"

            # Clean up old images
            docker image prune -f